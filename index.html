<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ltp's Maze Game</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #111827; color: #f3f4f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
        .hidden { display: none !important; }
        #canvas-container { overflow: auto; background-color: #1f2937; position: relative; width: 100%; height: 100%; }
        canvas { background-image: linear-gradient(#374151 1px, transparent 1px), linear-gradient(90deg, #374151 1px, transparent 1px); background-size: 20px 20px; cursor: crosshair; }
        .modal { background: rgba(0,0,0,0.8); backdrop-filter: blur(4px); }
        .scrollable { overflow-y: auto; max-height: calc(100vh - 200px); }
        .tab-btn.active { border-bottom: 2px solid #3b82f6; color: #3b82f6; }
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #1f2937; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #6b7280; }
    </style>
</head>
<body class="h-screen w-screen flex flex-col selection:bg-blue-500 selection:text-white">

    <!-- Global Message Modal -->
    <div id="msg-modal" class="fixed inset-0 z-50 modal hidden flex items-center justify-center">
        <div class="bg-gray-800 p-6 rounded-lg shadow-xl max-w-sm w-full border border-gray-700">
            <h3 id="msg-title" class="text-xl font-bold mb-2">Notice</h3>
            <p id="msg-text" class="text-gray-300 mb-4"></p>
            <button onclick="closeMsg()" class="w-full bg-blue-600 hover:bg-blue-500 p-2 rounded font-semibold transition">OK</button>
        </div>
    </div>

    <!-- Login / Register Screen -->
    <div id="screen-login" class="flex-1 flex items-center justify-center">
        <div class="bg-gray-800 p-8 rounded-xl shadow-2xl w-96 border border-gray-700">
            <h1 class="text-3xl font-bold text-center mb-6 text-blue-400">Ltp's Maze Game</h1>
            <div id="login-form">
                <input type="text" id="auth-username" placeholder="Username" class="w-full bg-gray-900 border border-gray-700 rounded p-3 mb-4 focus:outline-none focus:border-blue-500">
                <input type="password" id="auth-password" placeholder="Password" class="w-full bg-gray-900 border border-gray-700 rounded p-3 mb-6 focus:outline-none focus:border-blue-500">
                <div class="flex gap-2">
                    <button onclick="handleAuth('login')" class="flex-1 bg-blue-600 hover:bg-blue-500 p-3 rounded font-bold transition">Login</button>
                    <button onclick="handleAuth('register')" class="flex-1 bg-green-600 hover:bg-green-500 p-3 rounded font-bold transition">Register</button>
                </div>
            </div>
            <div id="login-loading" class="hidden text-center text-gray-400 mt-4">Connecting to Database...</div>
        </div>
    </div>

    <!-- Main Menu Screen -->
    <div id="screen-menu" class="hidden flex-1 flex flex-col">
        <header class="bg-gray-800 p-4 border-b border-gray-700 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-blue-400">Ltp's Maze Game</h1>
            <div class="flex items-center gap-4">
                <span id="header-user-info" class="text-sm text-gray-300"></span>
                <button onclick="showScreen('profile')" class="text-gray-400 hover:text-white transition"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg></button>
                <button onclick="logout()" class="text-red-400 hover:text-red-300 font-bold text-sm">Logout</button>
            </div>
        </header>
        <div class="flex-1 p-8 flex gap-6 overflow-hidden">
            <!-- Navigation Sidebar -->
            <div class="w-64 flex flex-col gap-3">
                <button onclick="showSubMenu('play')" class="bg-blue-600 hover:bg-blue-500 p-4 rounded-lg font-bold text-left transition shadow-lg">Play Levels</button>
                <button onclick="openEditor()" class="bg-purple-600 hover:bg-purple-500 p-4 rounded-lg font-bold text-left transition shadow-lg">Level Editor</button>
                <button onclick="showSubMenu('leaderboard')" class="bg-yellow-600 hover:bg-yellow-500 p-4 rounded-lg font-bold text-left transition shadow-lg">Leaderboard</button>
                <button id="admin-btn" onclick="showSubMenu('admin')" class="hidden bg-red-600 hover:bg-red-500 p-4 rounded-lg font-bold text-left transition shadow-lg">Admin Panel</button>
            </div>

            <!-- Content Area -->
            <div class="flex-1 bg-gray-800 rounded-lg border border-gray-700 p-6 flex flex-col scrollable">
                
                <!-- Play / Browser Tab -->
                <div id="tab-play" class="hidden flex-1 flex flex-col">
                    <div class="flex gap-2 mb-6">
                        <input type="number" id="search-level-id" placeholder="Search Level ID..." class="flex-1 bg-gray-900 border border-gray-600 rounded p-2 focus:outline-none focus:border-blue-500">
                        <button onclick="searchLevel()" class="bg-blue-600 hover:bg-blue-500 px-4 rounded font-bold">Search</button>
                    </div>
                    <div class="flex gap-4 border-b border-gray-700 mb-4 pb-2">
                        <button onclick="filterLevels('official')" id="btn-flt-official" class="tab-btn active font-bold">Official</button>
                        <button onclick="filterLevels('daily')" id="btn-flt-daily" class="tab-btn font-bold text-gray-400">Daily</button>
                        <button onclick="filterLevels('weekly')" id="btn-flt-weekly" class="tab-btn font-bold text-gray-400">Weekly</button>
                        <button onclick="filterLevels('all')" id="btn-flt-all" class="tab-btn font-bold text-gray-400">Recent</button>
                    </div>
                    <div id="level-list" class="flex flex-col gap-3 flex-1 overflow-y-auto pr-2"></div>
                </div>

                <!-- Leaderboard Tab -->
                <div id="tab-leaderboard" class="hidden flex-1 flex flex-col">
                    <h2 class="text-2xl font-bold mb-4">Leaderboard</h2>
                    <div class="flex gap-4 border-b border-gray-700 mb-4 pb-2">
                        <button onclick="loadLeaderboard('bricks')" id="btn-lb-bricks" class="tab-btn active font-bold">Bricks</button>
                        <button onclick="loadLeaderboard('cp')" id="btn-lb-cp" class="tab-btn font-bold text-gray-400">Creator Points</button>
                    </div>
                    <div id="leaderboard-list" class="flex flex-col gap-2 flex-1 overflow-y-auto pr-2"></div>
                </div>

                <!-- Admin Panel Tab -->
                <div id="tab-admin" class="hidden flex-1 flex flex-col">
                    <h2 class="text-2xl font-bold mb-4 text-red-400">Admin Control Panel</h2>
                    <div class="flex gap-4 border-b border-gray-700 mb-4 pb-2">
                        <button onclick="loadAdminLevels()" id="btn-adm-levels" class="tab-btn active font-bold">Manage Levels</button>
                        <button onclick="loadAdminUsers()" id="btn-adm-users" class="tab-btn font-bold text-gray-400">Manage Users</button>
                    </div>
                    <div id="admin-list" class="flex flex-col gap-3 flex-1 overflow-y-auto pr-2"></div>
                </div>

                <!-- Profile Tab -->
                <div id="tab-profile" class="hidden flex-1 flex flex-col items-center justify-center">
                    <div class="bg-gray-900 p-8 rounded-lg w-full max-w-md border border-gray-700">
                        <h2 class="text-2xl font-bold mb-6 text-center">My Profile</h2>
                        <p class="mb-2 text-gray-400">Username: <span id="prof-username" class="text-white font-bold"></span></p>
                        <p class="mb-2 text-gray-400">Bricks: <span id="prof-bricks" class="text-yellow-400 font-bold"></span></p>
                        <p class="mb-6 text-gray-400">Creator Points: <span id="prof-cp" class="text-purple-400 font-bold"></span></p>
                        
                        <h3 class="font-bold mb-2">Change Password</h3>
                        <input type="password" id="new-password" placeholder="New Password" class="w-full bg-gray-800 border border-gray-600 rounded p-2 mb-3 focus:outline-none focus:border-blue-500">
                        <button onclick="changePassword()" class="w-full bg-blue-600 hover:bg-blue-500 p-2 rounded font-bold">Update Password</button>
                        
                        <h3 class="font-bold mt-6 mb-2 text-red-400">Danger Zone</h3>
                        <button onclick="deleteAccount()" class="w-full bg-red-700 hover:bg-red-600 p-2 rounded font-bold text-white">Delete Account</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Level Editor Screen -->
    <div id="screen-editor" class="hidden flex-1 flex flex-col bg-gray-900">
        <header class="bg-gray-800 p-3 border-b border-gray-700 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <button onclick="closeEditor()" class="bg-gray-700 hover:bg-gray-600 px-3 py-1 rounded">Back</button>
                <h1 class="font-bold text-lg">Level Editor</h1>
                <input type="text" id="editor-level-name" placeholder="Level Name" class="bg-gray-900 border border-gray-600 rounded px-2 py-1 text-sm focus:outline-none">
            </div>
            <div class="flex gap-2">
                <button onclick="testLevel()" class="bg-green-600 hover:bg-green-500 px-3 py-1 rounded font-bold text-sm">Playtest</button>
                <button onclick="saveLevel(false)" class="bg-blue-600 hover:bg-blue-500 px-3 py-1 rounded font-bold text-sm">Save & Upload</button>
                <button onclick="saveLevel(true)" class="bg-gray-600 hover:bg-gray-500 px-3 py-1 rounded font-bold text-sm">Save Private</button>
            </div>
        </header>
        <div class="flex flex-1 overflow-hidden">
            <!-- Toolbar -->
            <div class="w-56 bg-gray-800 border-r border-gray-700 flex flex-col p-3 gap-4 overflow-y-auto">
                <div>
                    <h3 class="text-xs font-bold text-gray-400 uppercase mb-2">Tools</h3>
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="setTool('wall')" id="tool-wall" class="tool-btn bg-blue-600 border border-blue-400 rounded p-2 text-sm text-center">Wall</button>
                        <button onclick="setTool('start')" id="tool-start" class="tool-btn bg-gray-700 rounded p-2 text-sm text-center">Start</button>
                        <button onclick="setTool('trigger')" id="tool-trigger" class="tool-btn bg-gray-700 rounded p-2 text-sm text-center">Trigger</button>
                        <button onclick="setTool('erase')" id="tool-erase" class="tool-btn bg-red-900 rounded p-2 text-sm text-center">Erase</button>
                        <button onclick="setTool('select')" id="tool-select" class="tool-btn bg-gray-700 rounded p-2 text-sm text-center col-span-2">Select</button>
                    </div>
                </div>
                <div id="properties-panel">
                    <h3 class="text-xs font-bold text-gray-400 uppercase mb-2">Properties</h3>
                    <div class="flex flex-col gap-2 text-sm">
                        <label class="flex justify-between items-center">
                            Color:
                            <input type="color" id="prop-color" value="#ffffff" class="w-8 h-8 rounded cursor-pointer bg-transparent border-0" onchange="updateProp()">
                        </label>
                        <label class="flex justify-between items-center">
                            Solid:
                            <input type="checkbox" id="prop-solid" checked class="w-4 h-4 cursor-pointer" onchange="updateProp()">
                        </label>
                        <label class="flex justify-between items-center">
                            Transparency:
                            <input type="range" id="prop-alpha" min="0" max="1" step="0.1" value="1" class="w-20 cursor-pointer" onchange="updateProp()">
                        </label>
                        <label class="flex justify-between items-center">
                            Anchored:
                            <input type="checkbox" id="prop-anchored" checked class="w-4 h-4 cursor-pointer" onchange="updateProp()">
                        </label>
                        <div id="prop-trigger-box" class="hidden flex-col gap-1 mt-2">
                            <span class="text-xs text-gray-400">Trigger Action:</span>
                            <select id="prop-action" class="bg-gray-900 border border-gray-600 p-1 rounded w-full" onchange="updateProp()">
                                <option value="WIN">Win Level</option>
                                <option value="DIE">Kill Player</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="mt-auto">
                    <button onclick="clearGrid()" class="w-full bg-red-600 hover:bg-red-500 p-2 rounded text-sm font-bold">Clear All</button>
                </div>
            </div>
            <!-- Editor Canvas -->
            <div id="canvas-container" class="flex-1" oncontextmenu="return false;">
                <canvas id="editor-canvas" width="1280" height="1280"></canvas>
            </div>
        </div>
    </div>

    <!-- Play Screen -->
    <div id="screen-play" class="hidden flex-1 flex flex-col bg-black">
        <header class="bg-gray-900 p-2 border-b border-gray-800 flex justify-between items-center z-10 absolute top-0 w-full opacity-80 hover:opacity-100 transition">
            <button onclick="stopPlay()" class="bg-red-600 hover:bg-red-500 px-3 py-1 rounded font-bold text-sm">Exit Game</button>
            <h1 id="play-level-title" class="font-bold text-gray-200">Playing...</h1>
            <div id="play-status" class="text-sm font-bold text-yellow-400"></div>
        </header>
        <div class="flex-1 relative overflow-hidden" id="play-container">
            <canvas id="play-canvas" width="1280" height="1280" class="absolute top-0 left-0" style="background: none;"></canvas>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc, onSnapshot, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase Setup
        const firebaseConfig = {
            apiKey: "AIzaSyCo1rtBmJa8ea1PGAx3BTAgFVP9luFtdKI",
            authDomain: "somethingwicked-87e77.firebaseapp.com",
            projectId: "somethingwicked-87e77",
            storageBucket: "somethingwicked-87e77.firebasestorage.app",
            messagingSenderId: "1011430455701",
            appId: "1:1011430455701:web:bef8293371d71c143ade9c",
            measurementId: "G-8LNLNCTDY7"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appIdStr = "1:1011430455701:web:bef8293371d71c143ade9c";

        // Global State
        window.g_users = [];
        window.g_levels = [];
        window.myUserDocId = localStorage.getItem('ltp_maze_user_id') || null;
        window.currentUser = null;
        
        // Editor & Game State
        const TILE_SIZE = 20;
        const GRID_SIZE = 64; // 64x64 max viewable pixels requested (interpreted as grid)
        window.gridMap = new Map(); // "x,y" -> blockData
        window.currentTool = 'wall';
        window.selectedBlockPos = null;
        
        // Game Engine State
        window.isPlaying = false;
        window.players = [];
        window.keys = {};
        window.gameLoopId = null;
        window.currentLevelPlaying = null;

        // Constants
        const RATING_CP = { "Rated": 1, "Good": 2, "Really Good": 3, "Insanely Good": 4, "Daily": 5, "Weekly": 6 };
        const DIFF_BRICKS = { "Easy": 1, "Medium": 2, "Hard": 3, "Difficult": 4, "Insane": 5, "Really Hard": 6, "The Hardest": 7 };

        // --- Core Application Logic ---

        async function init() {
            try {
                await signInAnonymously(auth);
                setupListeners();
            } catch (e) {
                showMsg("Error", "Failed to connect to backend: " + e.message);
            }
        }

        function setupListeners() {
            const usersRef = collection(db, 'artifacts', appIdStr, 'public', 'data', 'users');
            onSnapshot(usersRef, (snapshot) => {
                window.g_users = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                checkAutoLogin();
                refreshUI();
            }, (err) => console.error("Users error", err));

            const levelsRef = collection(db, 'artifacts', appIdStr, 'public', 'data', 'levels');
            onSnapshot(levelsRef, (snapshot) => {
                window.g_levels = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                refreshUI();
            }, (err) => console.error("Levels error", err));
        }

        function checkAutoLogin() {
            if (window.myUserDocId) {
                const user = window.g_users.find(u => u.id === window.myUserDocId);
                if (user) {
                    window.currentUser = user;
                    showScreen('menu');
                    showSubMenu('play');
                    document.getElementById('header-user-info').innerText = `${user.username} | Bricks: ${user.bricks}`;
                    if (user.username === 'LtpMer') document.getElementById('admin-btn').classList.remove('hidden');
                } else {
                    window.myUserDocId = null;
                    localStorage.removeItem('ltp_maze_user_id');
                    showScreen('login');
                }
            }
        }

        // --- Auth Functions ---
        window.handleAuth = async (type) => {
            const uInput = document.getElementById('auth-username').value.trim();
            const pInput = document.getElementById('auth-password').value.trim();
            
            if (!uInput || !pInput) return showMsg("Error", "Username and password required.");
            if (uInput.length > 20) return showMsg("Error", "Username too long.");

            document.getElementById('login-loading').classList.remove('hidden');
            
            const existingUser = window.g_users.find(u => u.username.toLowerCase() === uInput.toLowerCase());

            if (type === 'register') {
                if (existingUser) {
                    document.getElementById('login-loading').classList.add('hidden');
                    return showMsg("Error", "Username already taken.");
                }
                const newDocId = "u_" + Date.now() + Math.floor(Math.random()*1000);
                const newUser = {
                    username: uInput,
                    password: btoa(pInput), // Basic obfuscation (NOT secure, but fits requirements)
                    bricks: 0,
                    cp: 0,
                    beaten: []
                };
                try {
                    await setDoc(doc(db, 'artifacts', appIdStr, 'public', 'data', 'users', newDocId), newUser);
                    window.myUserDocId = newDocId;
                    localStorage.setItem('ltp_maze_user_id', newDocId);
                    showMsg("Success", "Account created!");
                } catch(e) { showMsg("Error", e.message); }
            } else {
                // Login
                if (!existingUser) {
                    document.getElementById('login-loading').classList.add('hidden');
                    return showMsg("Error", "User not found.");
                }
                if (existingUser.password !== btoa(pInput)) {
                    document.getElementById('login-loading').classList.add('hidden');
                    return showMsg("Error", "Incorrect password.");
                }
                window.myUserDocId = existingUser.id;
                localStorage.setItem('ltp_maze_user_id', existingUser.id);
            }
            document.getElementById('login-loading').classList.add('hidden');
            checkAutoLogin();
        };

        window.logout = () => {
            window.myUserDocId = null;
            window.currentUser = null;
            localStorage.removeItem('ltp_maze_user_id');
            showScreen('login');
            document.getElementById('admin-btn').classList.add('hidden');
            document.getElementById('auth-username').value = '';
            document.getElementById('auth-password').value = '';
        };

        window.changePassword = async () => {
            const newPass = document.getElementById('new-password').value.trim();
            if(!newPass) return showMsg("Error", "Enter a new password");
            try {
                await updateDoc(doc(db, 'artifacts', appIdStr, 'public', 'data', 'users', window.myUserDocId), {
                    password: btoa(newPass)
                });
                showMsg("Success", "Password updated.");
                document.getElementById('new-password').value = '';
            } catch(e) { showMsg("Error", e.message); }
        };

        window.deleteAccount = async () => {
            if(!confirm("Are you SURE you want to delete your account? This cannot be undone.")) return;
            try {
                await deleteDoc(doc(db, 'artifacts', appIdStr, 'public', 'data', 'users', window.myUserDocId));
                logout();
            } catch(e) { showMsg("Error", e.message); }
        };

        // --- UI Navigation ---
        window.showScreen = (id) => {
            ['screen-login', 'screen-menu', 'screen-editor', 'screen-play'].forEach(s => document.getElementById(s).classList.add('hidden'));
            if(id === 'menu' && !window.currentUser) { id = 'login'; }
            document.getElementById('screen-' + id).classList.remove('hidden');
            if(id === 'menu') {
                if(window.currentUser) {
                    document.getElementById('header-user-info').innerText = `${window.currentUser.username} | Bricks: ${window.currentUser.bricks || 0} | CP: ${window.currentUser.cp || 0}`;
                }
            }
        };

        window.showSubMenu = (tabId) => {
            ['tab-play', 'tab-leaderboard', 'tab-admin', 'tab-profile'].forEach(t => document.getElementById(t).classList.add('hidden'));
            document.getElementById('tab-' + tabId).classList.remove('hidden');
            if(tabId === 'play') window.filterLevels('official');
            if(tabId === 'leaderboard') window.loadLeaderboard('bricks');
            if(tabId === 'admin') window.loadAdminLevels();
            if(tabId === 'profile') {
                document.getElementById('prof-username').innerText = window.currentUser.username;
                document.getElementById('prof-bricks').innerText = window.currentUser.bricks || 0;
                document.getElementById('prof-cp').innerText = window.currentUser.cp || 0;
            }
        };

        function refreshUI() {
            if(!window.currentUser) return;
            document.getElementById('header-user-info').innerText = `${window.currentUser.username} | Bricks: ${window.currentUser.bricks || 0} | CP: ${window.currentUser.cp || 0}`;
            // Refresh current active tab
            if(!document.getElementById('tab-play').classList.contains('hidden')) filterLevels(window.currentFilter || 'official');
            if(!document.getElementById('tab-leaderboard').classList.contains('hidden')) loadLeaderboard(window.currentLb || 'bricks');
            if(!document.getElementById('tab-admin').classList.contains('hidden') && window.currentUser.username === 'LtpMer') loadAdminLevels();
        }

        // --- Menus & Lists ---
        window.filterLevels = (type) => {
            window.currentFilter = type;
            ['official', 'daily', 'weekly', 'all'].forEach(t => {
                const b = document.getElementById('btn-flt-' + t);
                if(b) { b.classList.remove('active', 'text-blue-500'); b.classList.add('text-gray-400'); }
            });
            const activeBtn = document.getElementById('btn-flt-' + type);
            if(activeBtn) { activeBtn.classList.add('active', 'text-blue-500'); activeBtn.classList.remove('text-gray-400'); }

            let list = window.g_levels.filter(l => !l.private);
            if(type !== 'all') {
                list = list.filter(l => l.category === type);
            }
            list.sort((a,b) => (b.timestamp||0) - (a.timestamp||0));
            renderLevelList(list);
        };

        window.searchLevel = () => {
            const id = parseInt(document.getElementById('search-level-id').value);
            if(!id) return;
            const list = window.g_levels.filter(l => l.numericId === id && !l.private);
            renderLevelList(list);
        };

        function renderLevelList(levels) {
            const container = document.getElementById('level-list');
            container.innerHTML = '';
            if(levels.length === 0) return container.innerHTML = '<p class="text-gray-500">No levels found.</p>';

            levels.forEach(l => {
                const div = document.createElement('div');
                div.className = 'bg-gray-900 p-4 rounded border border-gray-700 flex justify-between items-center hover:border-blue-500 transition';
                
                const beaten = (window.currentUser.beaten || []).includes(l.id) ? '<span class="text-green-400 text-xs font-bold ml-2">✓ BEATEN</span>' : '';
                
                div.innerHTML = `
                    <div>
                        <h4 class="font-bold text-lg">${l.name} <span class="text-gray-500 text-sm">#${l.numericId}</span> ${beaten}</h4>
                        <p class="text-sm text-gray-400">By ${l.authorName} | Difficulty: <span class="text-yellow-400">${l.difficulty || 'Unrated'}</span> | Quality: <span class="text-purple-400">${l.rating || 'Unrated'}</span></p>
                    </div>
                    <div class="flex gap-2">
                        ${l.authorId === window.currentUser.id ? `<button onclick="editMyLevel('${l.id}')" class="bg-gray-700 hover:bg-gray-600 px-3 py-1 rounded text-sm">Edit</button>` : ''}
                        <button onclick="playLevel('${l.id}')" class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded font-bold">Play</button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        window.loadLeaderboard = (type) => {
            window.currentLb = type;
            ['bricks', 'cp'].forEach(t => {
                const b = document.getElementById('btn-lb-' + t);
                b.classList.remove('active', 'text-blue-500'); b.classList.add('text-gray-400');
            });
            document.getElementById('btn-lb-' + type).classList.add('active', 'text-blue-500'); document.getElementById('btn-lb-' + type).classList.remove('text-gray-400');

            const sorted = [...window.g_users].sort((a,b) => (b[type] || 0) - (a[type] || 0)).slice(0, 50);
            const container = document.getElementById('leaderboard-list');
            container.innerHTML = '';
            
            sorted.forEach((u, index) => {
                const div = document.createElement('div');
                div.className = 'bg-gray-900 p-3 rounded border border-gray-700 flex justify-between items-center';
                div.innerHTML = `
                    <div class="flex items-center gap-4">
                        <span class="text-xl font-bold text-gray-500 w-8">#${index+1}</span>
                        <span class="font-bold text-lg ${u.username === 'LtpMer' ? 'text-red-400' : 'text-white'}">${u.username}</span>
                    </div>
                    <div class="font-bold text-${type==='bricks'?'yellow':'purple'}-400">${u[type] || 0} ${type.toUpperCase()}</div>
                `;
                container.appendChild(div);
            });
        };

        // --- Admin Functions ---
        window.loadAdminLevels = () => {
            const container = document.getElementById('admin-list');
            container.innerHTML = '';
            const list = [...window.g_levels].sort((a,b) => (b.timestamp||0) - (a.timestamp||0));
            list.forEach(l => {
                const div = document.createElement('div');
                div.className = 'bg-gray-900 p-3 rounded border border-gray-700 flex flex-col gap-2';
                div.innerHTML = `
                    <div class="flex justify-between items-center">
                        <span class="font-bold">${l.name} (#${l.numericId}) by ${l.authorName}</span>
                        <div class="flex gap-2 text-xs">
                            <select id="adm-diff-${l.id}" class="bg-gray-800 border border-gray-600 rounded p-1">
                                <option value="">Unrated Diff</option>
                                ${Object.keys(DIFF_BRICKS).map(k => `<option value="${k}" ${l.difficulty===k?'selected':''}>${k}</option>`).join('')}
                            </select>
                            <select id="adm-rate-${l.id}" class="bg-gray-800 border border-gray-600 rounded p-1">
                                <option value="">Unrated Quality</option>
                                ${Object.keys(RATING_CP).map(k => `<option value="${k}" ${l.rating===k?'selected':''}>${k}</option>`).join('')}
                            </select>
                            <select id="adm-cat-${l.id}" class="bg-gray-800 border border-gray-600 rounded p-1">
                                <option value="user" ${l.category==='user'?'selected':''}>User</option>
                                <option value="official" ${l.category==='official'?'selected':''}>Official</option>
                                <option value="daily" ${l.category==='daily'?'selected':''}>Daily</option>
                                <option value="weekly" ${l.category==='weekly'?'selected':''}>Weekly</option>
                            </select>
                            <button onclick="adminUpdateLevel('${l.id}')" class="bg-blue-600 px-2 rounded">Update</button>
                            <button onclick="adminDeleteLevel('${l.id}')" class="bg-red-600 px-2 rounded">Del</button>
                        </div>
                    </div>
                `;
                container.appendChild(div);
            });
        };

        window.adminUpdateLevel = async (lvlId) => {
            const diff = document.getElementById(`adm-diff-${lvlId}`).value;
            const rate = document.getElementById(`adm-rate-${lvlId}`).value;
            const cat = document.getElementById(`adm-cat-${lvlId}`).value;
            
            const lvl = window.g_levels.find(l => l.id === lvlId);
            const oldRate = lvl.rating;
            
            try {
                await updateDoc(doc(db, 'artifacts', appIdStr, 'public', 'data', 'levels', lvlId), {
                    difficulty: diff || null,
                    rating: rate || null,
                    category: cat || 'user'
                });
                
                // Award CP to author if newly rated
                if (rate && rate !== oldRate && RATING_CP[rate]) {
                    const author = window.g_users.find(u => u.id === lvl.authorId);
                    if(author) {
                        const cpToAdd = RATING_CP[rate];
                        await updateDoc(doc(db, 'artifacts', appIdStr, 'public', 'data', 'users', author.id), {
                            cp: (author.cp || 0) + cpToAdd
                        });
                        showMsg("Admin", `Updated! Awarded ${cpToAdd} CP to ${author.username}`);
                    }
                } else {
                    showMsg("Admin", "Level updated.");
                }
            } catch(e) { showMsg("Error", e.message); }
        };

        window.adminDeleteLevel = async (id) => {
            if(!confirm("Delete this level completely?")) return;
            try { await deleteDoc(doc(db, 'artifacts', appIdStr, 'public', 'data', 'levels', id)); } catch(e){}
        };

        window.loadAdminUsers = () => {
            const container = document.getElementById('admin-list');
            container.innerHTML = '';
            window.g_users.forEach(u => {
                if(u.username === 'LtpMer') return;
                const div = document.createElement('div');
                div.className = 'bg-gray-900 p-3 rounded border border-gray-700 flex justify-between items-center';
                div.innerHTML = `<span>${u.username} (ID: ${u.id})</span><button onclick="adminDeleteUser('${u.id}')" class="bg-red-600 px-3 py-1 rounded font-bold text-xs">Remove User</button>`;
                container.appendChild(div);
            });
        };
        
        window.adminDeleteUser = async (id) => {
            if(!confirm("Ban/Delete user?")) return;
            try { await deleteDoc(doc(db, 'artifacts', appIdStr, 'public', 'data', 'users', id)); } catch(e){}
        };

        // --- Editor Logic ---
        const edCanvas = document.getElementById('editor-canvas');
        const edCtx = edCanvas.getContext('2d');
        let isDrawing = false;
        let isErasing = false;
        window.editLevelId = null; // null if new

        window.openEditor = () => {
            showScreen('editor');
            window.gridMap.clear();
            document.getElementById('editor-level-name').value = '';
            window.editLevelId = null;
            setTool('wall');
            drawEditor();
        };

        window.closeEditor = () => {
            if(confirm("Exit editor? Unsaved changes will be lost.")) showScreen('menu');
        };

        window.editMyLevel = (id) => {
            const lvl = window.g_levels.find(l => l.id === id);
            if(!lvl) return;
            showScreen('editor');
            window.editLevelId = id;
            document.getElementById('editor-level-name').value = lvl.name;
            window.gridMap.clear();
            
            try {
                const parsed = JSON.parse(lvl.grid);
                parsed.forEach(b => window.gridMap.set(`${b.x},${b.y}`, b));
            } catch(e) { console.error("Parse grid error", e); }
            
            drawEditor();
        };

        window.setTool = (t) => {
            window.currentTool = t;
            document.querySelectorAll('.tool-btn').forEach(btn => {
                btn.classList.remove('bg-blue-600', 'border', 'border-blue-400');
                if(btn.id !== 'tool-erase') btn.classList.add('bg-gray-700');
            });
            const active = document.getElementById('tool-' + t);
            if(t !== 'erase') {
                active.classList.remove('bg-gray-700');
                active.classList.add('bg-blue-600', 'border', 'border-blue-400');
            } else {
                active.classList.add('border', 'border-red-400');
            }

            const pColor = document.getElementById('prop-color');
            const pSolid = document.getElementById('prop-solid');
            const pAlpha = document.getElementById('prop-alpha');
            const pAnch = document.getElementById('prop-anchored');
            const pTrig = document.getElementById('prop-trigger-box');

            pTrig.classList.add('hidden');

            if(t === 'wall') {
                pColor.value = '#ffffff'; pSolid.checked = true; pAlpha.value = 1; pAnch.checked = true;
            } else if (t === 'start') {
                pColor.value = '#00ff00'; pSolid.checked = false; pAlpha.value = 1; pAnch.checked = true;
            } else if (t === 'trigger') {
                pColor.value = '#ff00ff'; pSolid.checked = false; pAlpha.value = 0.5; pAnch.checked = true;
                pTrig.classList.remove('hidden');
            }
            window.selectedBlockPos = null;
            drawEditor();
        };

        window.updateProp = () => {
            if (window.selectedBlockPos && window.currentTool === 'select') {
                const b = window.gridMap.get(window.selectedBlockPos);
                if (b) {
                    b.color = document.getElementById('prop-color').value;
                    b.solid = document.getElementById('prop-solid').checked;
                    b.alpha = parseFloat(document.getElementById('prop-alpha').value);
                    b.anchored = document.getElementById('prop-anchored').checked;
                    if(b.type === 'trigger') b.action = document.getElementById('prop-action').value;
                    drawEditor();
                }
            }
        };

        edCanvas.addEventListener('mousedown', (e) => {
            const rect = edCanvas.getBoundingClientRect();
            const scaleX = edCanvas.width / rect.width;
            const scaleY = edCanvas.height / rect.height;
            const x = Math.floor(((e.clientX - rect.left) * scaleX) / TILE_SIZE);
            const y = Math.floor(((e.clientY - rect.top) * scaleY) / TILE_SIZE);
            
            if(x < 0 || x >= GRID_SIZE || y < 0 || y >= GRID_SIZE) return;

            if (e.button === 2) { isErasing = true; handleGridAction(x, y, true); return; } // Right click erase
            
            isDrawing = true;
            if (window.currentTool === 'erase') {
                handleGridAction(x, y, true);
            } else if (window.currentTool === 'select') {
                window.selectedBlockPos = `${x},${y}`;
                const b = window.gridMap.get(window.selectedBlockPos);
                if (b) {
                    document.getElementById('prop-color').value = b.color;
                    document.getElementById('prop-solid').checked = b.solid;
                    document.getElementById('prop-alpha').value = b.alpha;
                    document.getElementById('prop-anchored').checked = b.anchored;
                    if(b.type === 'trigger') {
                        document.getElementById('prop-trigger-box').classList.remove('hidden');
                        document.getElementById('prop-action').value = b.action || 'WIN';
                    } else {
                        document.getElementById('prop-trigger-box').classList.add('hidden');
                    }
                }
            } else {
                handleGridAction(x, y, false);
            }
            drawEditor();
        });

        edCanvas.addEventListener('mousemove', (e) => {
            if (!isDrawing && !isErasing) return;
            const rect = edCanvas.getBoundingClientRect();
            const x = Math.floor(((e.clientX - rect.left) * (edCanvas.width / rect.width)) / TILE_SIZE);
            const y = Math.floor(((e.clientY - rect.top) * (edCanvas.height / rect.height)) / TILE_SIZE);
            if(x < 0 || x >= GRID_SIZE || y < 0 || y >= GRID_SIZE) return;

            if (window.currentTool !== 'select') {
                handleGridAction(x, y, isErasing || window.currentTool === 'erase');
                drawEditor();
            }
        });

        window.addEventListener('mouseup', () => { isDrawing = false; isErasing = false; });

        function handleGridAction(x, y, remove) {
            const key = `${x},${y}`;
            if (remove) {
                window.gridMap.delete(key);
            } else {
                const type = window.currentTool;
                if(type === 'select') return;
                const block = {
                    x, y, type,
                    color: document.getElementById('prop-color').value,
                    solid: document.getElementById('prop-solid').checked,
                    alpha: parseFloat(document.getElementById('prop-alpha').value),
                    anchored: document.getElementById('prop-anchored').checked
                };
                if(type === 'trigger') block.action = document.getElementById('prop-action').value;
                window.gridMap.set(key, block);
            }
        }

        window.clearGrid = () => {
            if(confirm("Clear entire grid?")) { window.gridMap.clear(); drawEditor(); }
        };

        function drawEditor() {
            edCtx.clearRect(0, 0, edCanvas.width, edCanvas.height);
            
            // Draw boundaries
            edCtx.strokeStyle = 'rgba(255,255,255,0.1)';
            edCtx.strokeRect(0, 0, GRID_SIZE*TILE_SIZE, GRID_SIZE*TILE_SIZE);

            window.gridMap.forEach((b, key) => {
                edCtx.globalAlpha = b.alpha;
                edCtx.fillStyle = b.color;
                edCtx.fillRect(b.x * TILE_SIZE, b.y * TILE_SIZE, TILE_SIZE, TILE_SIZE);
                
                if (b.type === 'start') {
                    edCtx.fillStyle = 'white'; edCtx.font = '10px Arial';
                    edCtx.fillText('S', b.x * TILE_SIZE + 6, b.y * TILE_SIZE + 14);
                }
                if (b.type === 'trigger') {
                    edCtx.fillStyle = 'white'; edCtx.font = '10px Arial';
                    edCtx.fillText('T', b.x * TILE_SIZE + 6, b.y * TILE_SIZE + 14);
                }
                edCtx.globalAlpha = 1;
            });

            if (window.selectedBlockPos && window.currentTool === 'select') {
                const [sx, sy] = window.selectedBlockPos.split(',').map(Number);
                edCtx.strokeStyle = 'yellow';
                edCtx.lineWidth = 2;
                edCtx.strokeRect(sx * TILE_SIZE, sy * TILE_SIZE, TILE_SIZE, TILE_SIZE);
                edCtx.lineWidth = 1;
            }
        }

        window.saveLevel = async (isPrivate) => {
            const name = document.getElementById('editor-level-name').value.trim();
            if(!name) return showMsg("Error", "Give your level a name!");
            
            let hasStart = false;
            window.gridMap.forEach(b => { if(b.type === 'start') hasStart = true; });
            if(!hasStart) return showMsg("Error", "Level needs at least one Start block.");

            const gridArr = Array.from(window.gridMap.values());
            const maxId = window.g_levels.reduce((m, l) => Math.max(m, l.numericId || 0), 0);
            
            const lvlData = {
                name,
                authorId: window.currentUser.id,
                authorName: window.currentUser.username,
                grid: JSON.stringify(gridArr),
                private: isPrivate,
                timestamp: Date.now()
            };

            try {
                if (window.editLevelId) {
                    // Update
                    await updateDoc(doc(db, 'artifacts', appIdStr, 'public', 'data', 'levels', window.editLevelId), lvlData);
                    showMsg("Success", "Level updated!");
                } else {
                    // Create new
                    lvlData.numericId = maxId + 1;
                    lvlData.category = 'user';
                    lvlData.difficulty = null;
                    lvlData.rating = null;
                    
                    const newId = "lvl_" + Date.now();
                    await setDoc(doc(db, 'artifacts', appIdStr, 'public', 'data', 'levels', newId), lvlData);
                    window.editLevelId = newId;
                    showMsg("Success", `Level uploaded! ID: ${lvlData.numericId}`);
                }
            } catch(e) { showMsg("Error", e.message); }
        };

        // --- Game Engine ---
        const playCanvas = document.getElementById('play-canvas');
        const playCtx = playCanvas.getContext('2d');
        const PLAYER_SIZE = 16;
        const SPEED = 3;

        window.addEventListener('keydown', e => { window.keys[e.key.toLowerCase()] = true; });
        window.addEventListener('keyup', e => { window.keys[e.key.toLowerCase()] = false; });

        window.testLevel = () => {
            const name = document.getElementById('editor-level-name').value || "Test Level";
            startGame(Array.from(window.gridMap.values()), { id: 'test', name, isTest: true });
        };

        window.playLevel = (id) => {
            const lvl = window.g_levels.find(l => l.id === id);
            if(!lvl) return;
            try {
                const gridData = JSON.parse(lvl.grid);
                startGame(gridData, lvl);
            } catch(e) { showMsg("Error", "Corrupt level data."); }
        };

        function startGame(gridData, metadata) {
            showScreen('play');
            document.getElementById('play-level-title').innerText = metadata.name;
            document.getElementById('play-status').innerText = "";
            window.currentLevelPlaying = metadata;
            
            // Build fast collision array
            window.gameBlocks = gridData;
            window.solidBlocks = gridData.filter(b => b.solid);
            window.triggers = gridData.filter(b => b.type === 'trigger');
            
            window.players = [];
            gridData.forEach(b => {
                if (b.type === 'start') {
                    window.players.push({
                        x: b.x * TILE_SIZE + (TILE_SIZE - PLAYER_SIZE)/2,
                        y: b.y * TILE_SIZE + (TILE_SIZE - PLAYER_SIZE)/2,
                        color: '#00ffff'
                    });
                }
            });

            if(window.players.length === 0) {
                // Fallback start
                window.players.push({ x: 10, y: 10, color: '#00ffff' });
            }

            window.isPlaying = true;
            if(window.gameLoopId) cancelAnimationFrame(window.gameLoopId);
            gameLoop();
        }

        window.stopPlay = () => {
            window.isPlaying = false;
            cancelAnimationFrame(window.gameLoopId);
            showScreen('menu');
        };

        function gameLoop() {
            if(!window.isPlaying) return;
            updateGame();
            drawGame();
            window.gameLoopId = requestAnimationFrame(gameLoop);
        }

        function checkCollision(px, py) {
            // Screen bounds
            if (px < 0 || px + PLAYER_SIZE > GRID_SIZE * TILE_SIZE || py < 0 || py + PLAYER_SIZE > GRID_SIZE * TILE_SIZE) return true;
            
            // Block bounds
            for(let b of window.solidBlocks) {
                const bx = b.x * TILE_SIZE;
                const by = b.y * TILE_SIZE;
                if (px < bx + TILE_SIZE && px + PLAYER_SIZE > bx &&
                    py < by + TILE_SIZE && py + PLAYER_SIZE > by) {
                    return true;
                }
            }
            return false;
        }

        function updateGame() {
            let dx = 0, dy = 0;
            if(window.keys['w'] || window.keys['arrowup']) dy -= SPEED;
            if(window.keys['s'] || window.keys['arrowdown']) dy += SPEED;
            if(window.keys['a'] || window.keys['arrowleft']) dx -= SPEED;
            if(window.keys['d'] || window.keys['arrowright']) dx += SPEED;

            let alivePlayers = [];

            for(let p of window.players) {
                if(p.dead) continue;
                
                // Move X
                if (dx !== 0 && !checkCollision(p.x + dx, p.y)) p.x += dx;
                // Move Y
                if (dy !== 0 && !checkCollision(p.x, p.y + dy)) p.y += dy;

                // Check Triggers
                let touchedTrigger = false;
                for(let t of window.triggers) {
                    const tx = t.x * TILE_SIZE, ty = t.y * TILE_SIZE;
                    if (p.x < tx + TILE_SIZE && p.x + PLAYER_SIZE > tx && p.y < ty + TILE_SIZE && p.y + PLAYER_SIZE > ty) {
                        if(t.action === 'DIE') {
                            p.dead = true;
                        } else if (t.action === 'WIN') {
                            handleWin();
                            return; // Stop update loop entirely
                        }
                    }
                }
                if(!p.dead) alivePlayers.push(p);
            }

            if(alivePlayers.length === 0 && window.players.length > 0) {
                // All died
                document.getElementById('play-status').innerText = "YOU DIED";
                document.getElementById('play-status').className = "text-red-500 font-bold text-xl";
                setTimeout(() => { if(window.isPlaying) window.stopPlay(); }, 1500);
                window.isPlaying = false;
            }
        }

        function drawGame() {
            playCtx.clearRect(0, 0, playCanvas.width, playCanvas.height);
            
            // Camera follow (Center on first alive player)
            const activePlayer = window.players.find(p => !p.dead);
            if(!activePlayer) return;

            const cw = playCanvas.parentElement.clientWidth;
            const ch = playCanvas.parentElement.clientHeight;
            
            let cx = activePlayer.x - cw/2;
            let cy = activePlayer.y - ch/2;
            
            // Clamp camera
            cx = Math.max(0, Math.min(cx, GRID_SIZE*TILE_SIZE - cw));
            cy = Math.max(0, Math.min(cy, GRID_SIZE*TILE_SIZE - ch));

            // Optional: If container is bigger than canvas, just center it
            if(cw >= GRID_SIZE*TILE_SIZE) cx = -(cw - GRID_SIZE*TILE_SIZE)/2;
            if(ch >= GRID_SIZE*TILE_SIZE) cy = -(ch - GRID_SIZE*TILE_SIZE)/2;

            playCanvas.style.transform = `translate(${-cx}px, ${-cy}px)`;

            // Draw blocks
            for(let b of window.gameBlocks) {
                if(b.type === 'start') continue; // hide start
                playCtx.globalAlpha = b.alpha !== undefined ? b.alpha : 1;
                playCtx.fillStyle = b.color || '#fff';
                playCtx.fillRect(b.x * TILE_SIZE, b.y * TILE_SIZE, TILE_SIZE, TILE_SIZE);
            }
            playCtx.globalAlpha = 1;

            // Draw players
            for(let p of window.players) {
                if(p.dead) continue;
                playCtx.fillStyle = p.color;
                playCtx.fillRect(p.x, p.y, PLAYER_SIZE, PLAYER_SIZE);
            }
        }

        async function handleWin() {
            window.isPlaying = false;
            document.getElementById('play-status').innerText = "LEVEL COMPLETED!";
            document.getElementById('play-status').className = "text-green-400 font-bold text-xl";

            const lvl = window.currentLevelPlaying;
            if(!lvl.isTest && lvl.difficulty && DIFF_BRICKS[lvl.difficulty]) {
                const beatenArr = window.currentUser.beaten || [];
                if (!beatenArr.includes(lvl.id)) {
                    beatenArr.push(lvl.id);
                    const bricksEarned = DIFF_BRICKS[lvl.difficulty];
                    const newTotal = (window.currentUser.bricks || 0) + bricksEarned;
                    
                    try {
                        await updateDoc(doc(db, 'artifacts', appIdStr, 'public', 'data', 'users', window.currentUser.id), {
                            beaten: beatenArr,
                            bricks: newTotal
                        });
                        showMsg("Level Complete!", `You earned ${bricksEarned} Bricks! Total: ${newTotal}`);
                    } catch(e) { console.error("Could not save progress"); }
                } else {
                    setTimeout(() => showMsg("Level Complete!", "You already beat this level, no extra bricks."), 500);
                }
            } else if (!lvl.isTest) {
                setTimeout(() => showMsg("Level Complete!", "This level is unrated. No bricks awarded."), 500);
            }

            setTimeout(() => { if(document.getElementById('play-status').innerText === "LEVEL COMPLETED!") window.stopPlay(); }, 2000);
        }

        // --- Utils ---
        window.showMsg = (title, text) => {
            document.getElementById('msg-title').innerText = title;
            document.getElementById('msg-text').innerText = text;
            document.getElementById('msg-modal').classList.remove('hidden');
        };
        window.closeMsg = () => { document.getElementById('msg-modal').classList.add('hidden'); };

        // Start
        init();
    </script>
</body>
